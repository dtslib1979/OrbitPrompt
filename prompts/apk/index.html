<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>PWA — OrbitPrompt</title>
  <link rel="icon" href="../../assets/icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-void: #050505;
      --bg-card: #141414;
      --bg-surface: #0f0f0f;
      --text-primary: #f0f0f0;
      --text-secondary: rgba(255,255,255,0.7);
      --text-muted: rgba(255,255,255,0.4);
      --accent: #22d3ee;
      --accent-dim: rgba(34,211,238,0.15);
      --border: rgba(255,255,255,0.08);
      --font-sans: 'Inter', -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-sans);
      background: var(--bg-void);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 1.5rem;
    }
    .container { max-width: 640px; margin: 0 auto; }

    header {
      text-align: center;
      padding: 1.5rem 0 2rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }
    .tag {
      font-family: var(--font-mono);
      font-size: 0.5625rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 0.25rem 0.5rem;
      display: inline-block;
      margin-bottom: 0.75rem;
    }
    h1 {
      font-family: var(--font-mono);
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      font-size: 0.8125rem;
      color: var(--text-muted);
    }

    .section { margin-bottom: 2rem; }
    .section-title {
      font-family: var(--font-mono);
      font-size: 0.625rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .item-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--text-primary);
      transition: all 0.15s;
    }
    .item:hover {
      border-color: var(--accent);
      background: var(--bg-surface);
    }
    .item-icon { font-size: 1.5rem; }
    .item-text { flex: 1; }
    .item-name { font-size: 0.875rem; font-weight: 500; margin-bottom: 0.125rem; }
    .item-meta { font-size: 0.6875rem; color: var(--text-muted); }
    .item-arrow { font-size: 0.875rem; color: var(--text-muted); }
    .item.primary {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .item.primary .item-name { color: var(--accent); }

    .empty {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      font-size: 0.8125rem;
      background: var(--bg-card);
      border: 1px dashed var(--border);
    }

    footer {
      text-align: center;
      padding: 2rem 0 1rem;
      border-top: 1px solid var(--border);
      margin-top: 2rem;
    }
    .footer-link {
      font-family: var(--font-mono);
      font-size: 0.625rem;
      color: var(--text-muted);
      text-decoration: none;
    }
    .footer-link:hover { color: var(--accent); }
  </style>
</head>
<body>
  <script src="../../assets/js/nav.js"></script>
  <div class="container">
    <header>
      <span class="tag">Prompt Engine</span>
      <h1>📱 PWA</h1>
      <p class="subtitle">앱 요구사항 → 설치 가능한 PWA 코드</p>
    </header>

    <div class="section">
      <p class="section-title">도구</p>
      <div class="item-list">
        <a href="pwa-generator.html" class="item primary">
          <span class="item-icon">⚡</span>
          <div class="item-text">
            <div class="item-name">PWA Generator</div>
            <div class="item-meta">앱 유형/기능 선택 → 프롬프트 생성 → LLM이 PWA 코드 생성</div>
          </div>
          <span class="item-arrow">→</span>
        </a>
      </div>
    </div>

    <div class="section">
      <p class="section-title">Archive — 생성된 PWA</p>
      <div class="empty">
        아직 생성된 PWA가 없습니다.<br>
        Generator로 첫 번째 PWA를 만들어보세요.
      </div>
    </div>

    <footer>
      <a href="../../index.html" class="footer-link">← OrbitPrompt</a>
    </footer>
  </div>
</body>
</html>
