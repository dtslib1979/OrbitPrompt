<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#07070d;--gold:#d4af37;--brass:#b8982a;--ink:#f0e8d8;--dim:rgba(240,232,216,.5);--muted:rgba(240,232,216,.3);--cyan:#22d3ee;--purple:#a855f7;--green:#4ade80;--blue:#60a5fa}
html,body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;height:100%;overflow:hidden;font-size:14px}
body::after{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 60% 40% at 20% 20%,rgba(212,175,55,.04) 0%,transparent 60%),
  radial-gradient(ellipse 40% 35% at 80% 70%,rgba(34,211,238,.03) 0%,transparent 50%),
  radial-gradient(ellipse 30% 25% at 50% 100%,rgba(168,85,247,.02) 0%,transparent 40%);
pointer-events:none;z-index:0}
header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;padding:0 20px;height:48px;background:rgba(7,7,13,.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.04)}
header .brand{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--gold);text-decoration:none;letter-spacing:.08em}
header nav{display:flex;gap:12px;margin-left:auto}
header nav a{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);text-decoration:none;letter-spacing:.08em;transition:color .25s}
header nav a:hover{color:var(--gold)}
.title-group{position:fixed;z-index:40;pointer-events:none;text-align:center;left:50%;top:52px;transform:translateX(-50%);opacity:0;animation:fadeIn .6s ease .3s forwards}
.title-group .tag{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.3em;color:var(--gold);text-transform:uppercase}
.title-group h1{font-family:'Playfair Display',serif;font-size:clamp(14px,2.2vw,28px);font-weight:400;color:#fff;margin:2px 0 1px;font-style:italic}
.title-group h1 em{font-style:normal;color:var(--gold)}
.title-group .sub{font-size:clamp(7px,.6vw,9px);color:var(--muted);letter-spacing:.05em}
@keyframes fadeIn{to{opacity:1}}
#cv{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:10;touch-action:none}
#sv{width:100%;height:100%;display:block;cursor:grab}
#sv:active{cursor:grabbing}
.e{fill:none;stroke-linecap:round;pointer-events:none;transition:opacity .35s}
.hub-text{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.15em;text-anchor:middle;dominant-baseline:middle;pointer-events:none;text-transform:uppercase;font-weight:500}
.leaf-text{font-family:'Inter',sans-serif;font-size:7px;text-anchor:middle;dominant-baseline:middle;pointer-events:none;font-weight:400;letter-spacing:.02em}
.center-text{font-family:'Playfair Display',serif;font-style:italic;font-size:18px;text-anchor:middle;dominant-baseline:middle;pointer-events:none;fill:var(--gold)}
#controls{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:50;display:flex;gap:6px;align-items:center}
#controls button{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:8px;padding:4px 10px;border-radius:4px;cursor:pointer;transition:all .25s;pointer-events:auto}
#controls button:hover{border-color:var(--gold);color:var(--gold);background:rgba(212,175,55,.06)}
#controls .badge{font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:.08em}
#info-panel{position:fixed;bottom:52px;left:50%;transform:translateX(-50%);z-index:45;background:rgba(7,7,13,.88);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:6px 14px;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;font-size:11px;color:var(--dim);max-width:80vw;overflow:hidden;text-overflow:ellipsis}
#info-panel.visible{opacity:1}
#info-panel .ip-label{font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--gold);letter-spacing:.15em;margin-right:6px}
#info-panel .ip-title{font-weight:500;color:#fff;margin-right:8px}
#info-panel .ip-path{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted)}
footer{position:fixed;bottom:0;left:0;right:0;z-index:30;display:flex;justify-content:center;gap:4px;flex-wrap:wrap;padding:4px 10px;pointer-events:none;background:linear-gradient(0deg,rgba(7,7,13,.6) 0%,transparent 100%)}
footer a{pointer-events:auto;font-family:'JetBrains Mono',monospace;font-size:6px;color:var(--muted);text-decoration:none;letter-spacing:.06em;padding:2px 6px;transition:color .25s}
footer a:hover{color:var(--gold)}
@media(max-width:700px){header nav{display:none}}
@media(max-width:500px){.title-group .tag{font-size:7px}.title-group h1{font-size:12px}.hub-text{font-size:6px}.leaf-text{font-size:5px}}

<script>
(function(){
"use strict";

// ── COLOR PALETTE ──
var C_GOLD="#d4af37",C_BRASS="#b8982a",C_CYAN="#22d3ee",C_PURPLE="#a855f7",C_GREEN="#4ade80",C_BLUE="#60a5fa";
var C_DIM="rgba(240,232,216,.45)",C_MUTED="rgba(240,232,216,.18)";

// ── DATA ──
var HUBS=[
  {id:"phil", label:"철학", color:C_PURPLE, leaves:[
    {label:"WHY", href:"why.html"},
    {label:"백서", href:"whitepaper.html"},
    {label:"7축", href:"philosophy.html"},
    {label:"휴머니티", href:"humanity-finger.html"},
    {label:"자동화영역", href:"docs/PHILOSOPHER-AUTOMATION-REPORT.md"},
    {label:"정당화", href:"docs/JUSTIFICATION-v2.md"},
    {label:"싱크계획", href:"docs/PHILOSOPHER-SYNC-PLAN.md"},
    {label:"정체성", href:"identity.html"}
  ]},
  {id:"mcp", label:"MCP 서버", color:C_CYAN, leaves:[
    {label:"철학카운터", href:"philosophy-counter/mcp/server.py"},
    {label:"정치 MCP", href:"political-mcp/index.html"},
    {label:"ID-MANIFEST", href:"identity-mcp/index.html"},
    {label:"철학 브랜치", href:"branch-philosophy-mcp/index.html"},
    {label:"단말기 조건", href:"terminal-condition-mcp/index.html"},
    {label:"축구 MCP", href:"football-model/mcp/index.html"},
    {label:"달러 시스템", href:"dollar-system-mcp/index.html"},
    {label:"Edu", href:"edu-mcp/index.html"},
    {label:"Media", href:"media-mcp/index.html"},
    {label:"금융", href:"parksy-finance-mcp/index.html"},
    {label:"Module Gallery", href:"mcp-parksy-module-gallery/index.js"}
  ]},
  {id:"gen", label:"생성기", color:C_GOLD, leaves:[
    {label:"칠판", href:"prompts/chalkboard/index.html"},
    {label:"PWA", href:"prompts/apk/index.html"},
    {label:"Editorial", href:"prompts/editorial/index.html"},
    {label:"Dataset", href:"prompts/dataset/index.html"},
    {label:"Identity", href:"prompts/identity/index.html"},
    {label:"Instruction", href:"prompts/instruction/index.html"},
    {label:"Route", href:"prompts/route/index.html"},
    {label:"Form", href:"prompts/form/index.html"},
    {label:"Publisher", href:"prompts/publisher/index.html"},
    {label:"Printer", href:"prompts/printer/index.html"},
    {label:"Studio", href:"prompts/studio/index.html"},
    {label:"Dictionary", href:"prompts/dictionary/index.html"}
  ]},
  {id:"mod", label:"모듈", color:C_GREEN, leaves:[
    {label:"축구 모델", href:"football-model/index.html"},
    {label:"선거", href:"boards/election-gallery.html"},
    {label:"달러 백서", href:"boards/dollar-system-whitepaper.html"},
    {label:"MCP 방법론", href:"boards/mcp-methodology.html"},
    {label:"오디오 공장", href:"boards/audio-factory.html"},
    {label:"메모리얼", href:"boards/memorial-tribute.html"},
    {label:"뮤직 큐레이션", href:"boards/music-curation.html"},
    {label:"튜토리얼", href:"boards/parksy-capture-tutorial.html"}
  ]},
  {id:"arc", label:"아카이브", color:C_BLUE, leaves:[
    {label:"Archive", href:"archive.html"},
    {label:"Map", href:"map.html"},
    {label:"Links", href:"links/index.html"},
    {label:"정당성", href:"docs/JUSTIFICATION-REPORT.md"},
    {label:"미셔너", href:"docs/AI-MISSIONARY-PLUGIN-WHITEPAPER.md"},
    {label:"경쟁구도", href:"docs/COMPETITIVE-LANDSCAPE.md"},
    {label:"기술명세", href:"docs/TECHNICAL_SPECIFICATIONS.md"},
    {label:"진리체계", href:"docs/EPISTEMIC_STANCE.md"}
  ]}
];

// ── SVG HELPERS ──
var sv=document.getElementById("sv"),cv=document.getElementById("cv");
var W=1400,H=1400;
sv.setAttribute("viewBox",-W/2+" "+ -H/2+" "+W+" "+H);
var ns="http://www.w3.org/2000/svg";
function el(t,a){var e=document.createElementNS(ns,t);if(a)for(var k in a)a.hasOwnProperty(k)&&e.setAttribute(k,a[k]);return e}

// ── NODES ──
var nodes=[],edges=[];
var nodeMap={};
var centerNode;

// Center
centerNode={id:"center",x:0,y:0,fx:0,fy:0,vx:0,vy:0,radius:28,color:C_GOLD,type:"center",label:"OrbitPrompt",edges:[]};
nodes.push(centerNode);
nodeMap.center=centerNode;

// Hub positions initial (pentagon)
var hubRadius=250;
HUBS.forEach(function(h,i){
  var a=i/HUBS.length*Math.PI*2-Math.PI/2;
  var hx=Math.cos(a)*hubRadius,hy=Math.sin(a)*hubRadius;
  var hn={id:"hub_"+h.id, x:hx,y:hy,fx:0,fy:0,vx:0,vy:0,radius:16,color:h.color,type:"hub",label:h.label,hubId:h.id,edges:[]};
  nodes.push(hn);nodeMap[hn.id]=hn;

  // Center→hub edge
  var e1={from:"center",to:hn.id};
  edges.push(e1);
  hn.edges.push(e1);centerNode.edges.push(e1);

  h.leaves.forEach(function(l,j){
    var ld=45+(j%3)*15;
    var la=a+(j-h.leaves.length/2)*0.2;
    var lx=hx+Math.cos(la)*ld,ly=hy+Math.sin(la)*ld*0.5;
    var ln={id:"leaf_"+h.id+"_"+j, x:lx,y:ly,fx:0,fy:0,vx:0,vy:0,radius:7,color:h.color,type:"leaf",label:l.label,href:l.href,hubId:h.id,edges:[]};
    nodes.push(ln);nodeMap[ln.id]=ln;

    var e2={from:hn.id,to:ln.id};
    edges.push(e2);
    ln.edges.push(e2);hn.edges.push(e2);
  });
});

// ── SVG BUILD ──
function buildSVG(){
  edges.forEach(function(e){
    var line=el("line",{"class":"e",stroke:C_MUTED,"stroke-width":.6});
    sv.appendChild(line);
    e.el=line;
  });

  // Center glow rings
  sv.appendChild(el("circle",{cx:0,cy:0,r:80,fill:"none",stroke:C_GOLD,"stroke-width":.3,opacity:.08,filter:"url(#glow)"}));
  sv.appendChild(el("circle",{cx:0,cy:0,r:120,fill:"none",stroke:C_GOLD,"stroke-width":.2,opacity:.04}));

  var ct=el("text",{x:0,y:0,"class":"center-text"});ct.textContent="OrbitPrompt";sv.appendChild(ct);

  nodes.forEach(function(n){
    if(n.type==="center")return;
    var g=el("g",{"data-id":n.id,"class":"nn"});

    if(n.type==="hub"){
      g.appendChild(el("circle",{cx:0,cy:0,r:n.radius+2,fill:"rgba(0,0,0,.3)",filter:"url(#shadow)"}));
      g.appendChild(el("circle",{cx:0,cy:0,r:n.radius,fill:n.color,opacity:.85}));
      g.appendChild(el("circle",{cx:0,cy:0,r:4,fill:"#fff",opacity:.4}));
      var t=el("text",{x:0,y:n.radius+13,"class":"hub-text",fill:n.color});t.textContent=n.label;
      g.appendChild(t);
    }else{
      g.appendChild(el("circle",{cx:0,cy:0,r:18,fill:"transparent",cursor:"pointer"}));
      g.appendChild(el("circle",{cx:0,cy:0,r:n.radius+1,fill:"rgba(0,0,0,.2)",filter:"url(#shadow)"}));
      g.appendChild(el("circle",{cx:0,cy:0,r:n.radius,fill:n.color,opacity:.6}));
      var t=el("text",{x:0,y:n.radius+11,"class":"leaf-text",fill:n.color});t.textContent=n.label;
      g.appendChild(t);
    }

    sv.appendChild(g);
    n.el=g;
    n.lx=n.x;n.ly=n.y;
  });

  // Cross-hub edges
  var crossPairs=[["hub_phil","hub_mcp"],["hub_phil","hub_gen"],["hub_mcp","hub_gen"],["hub_mcp","hub_mod"],["hub_mod","hub_arc"],["hub_gen","hub_arc"]];
  crossPairs.forEach(function(p){
    var l=el("line",{"class":"e",stroke:"rgba(255,255,255,.06)","stroke-width":.5,"stroke-dasharray":"3,4"});
    sv.appendChild(l);
    edges.push({from:p[0],to:p[1],el:l,dash:true});
  });
}
buildSVG();

// ── PHYSICS ──
var REP=25000, ATT=0.004, GRAV=0.0006, DAMP=0.82, MIN_D=25, REST=100, GROUP_REP_MULT=0.12;
var simRunning=true,simFrames=0;

function physicsTick(){
  nodes.forEach(function(n){n.fx=0;n.fy=0;});

  for(var i=0;i<nodes.length;i++){
    var a=nodes[i];if(a.type==="center")continue;
    for(var j=i+1;j<nodes.length;j++){
      var b=nodes[j];if(b.type==="center")continue;
      var sameGroup=(a.hubId&&b.hubId&&a.hubId===b.hubId);
      var repMult=sameGroup?GROUP_REP_MULT:1.0;
      var dx=b.x-a.x, dy=b.y-a.y;
      var d=Math.max(Math.hypot(dx,dy),MIN_D);
      var f=REP*repMult/(d*d);
      var fx=f*dx/d, fy=f*dy/d;
      a.fx-=fx;a.fy-=fy;
      b.fx+=fx;b.fy+=fy;
    }
  }

  edges.forEach(function(e){
    var a=nodeMap[e.from],b=nodeMap[e.to];
    if(!a||!b)return;
    var dx=b.x-a.x, dy=b.y-a.y;
    var d=Math.hypot(dx,dy)||1;
    var disp=d-REST;
    var f=ATT*disp;
    var fx=f*dx/d, fy=f*dy/d;
    a.fx+=fx;a.fy+=fy;
    b.fx-=fx;b.fy-=fy;
  });

  nodes.forEach(function(n){
    if(n.type==="center")return;
    var str=(n.type==="hub")?GRAV*1.25:GRAV;
    n.fx-=str*n.x;n.fy-=str*n.y;
  });

  nodes.forEach(function(n){
    if(n.type==="center")return;
    n.vx=(n.vx+n.fx*0.5)*DAMP;
    n.vy=(n.vy+n.fy*0.5)*DAMP;
    n.x+=n.vx;n.y+=n.vy;
  });

  simFrames++;
  if(simFrames>400){
    var m=0;
    nodes.forEach(function(n){if(n.type!=="center")m=Math.max(m,Math.hypot(n.vx,n.vy));});
    if(m<0.05)simRunning=false;
  }
}

function wakeSim(){simRunning=true;simFrames=0;}

// ── RENDER ──
var zoom=1,tz=1,panX=0,panY=0,dx=0,dy=0;

function renderFrame(){
  edges.forEach(function(e){
    var a=nodeMap[e.from],b=nodeMap[e.to];
    if(!a||!b||!e.el)return;
    e.el.setAttribute("x1",a.x);e.el.setAttribute("y1",a.y);
    e.el.setAttribute("x2",b.x);e.el.setAttribute("y2",b.y);
  });

  nodes.forEach(function(n){
    if(n.type==="center"||!n.el)return;
    n.el.setAttribute("transform","translate("+n.x.toFixed(1)+","+n.y.toFixed(1)+")");
  });
}

function applyView(){
  sv.style.transformOrigin="50% 50%";
  sv.style.transform="translate("+(panX+dx/zoom).toFixed(1)+"px,"+(panY+dy/zoom).toFixed(1)+"px) scale("+zoom.toFixed(4)+")";
}

// ── INTERACTION ──
var dragId=null,dragging=false;
var sx=0,sy=0;
var ip=document.getElementById("info-panel");

function scrToSvg(cx,cy){
  var r=sv.getBoundingClientRect();
  var vx=(cx-r.left)/r.width*W-W/2;
  var vy=(cy-r.top)/r.height*H-H/2;
  return {x:(vx-panX)/zoom,y:(vy-panY)/zoom};
}

function hitNode(cx,cy){
  var p=scrToSvg(cx,cy);
  var best=null,bestD=45;
  nodes.forEach(function(n){
    if(n.type==="center")return;
    var d=Math.hypot(n.x-p.x,n.y-p.y);
    var thresh=n.type==="hub"?30:22;
    if(d<thresh&&d<bestD){bestD=d;best=n;}
  });
  return best;
}

function showInfo(n){
  if(n&&n.type==="leaf"&&n.href){
    ip.querySelector(".ip-label").textContent="◆";
    ip.querySelector(".ip-title").textContent=n.label;
    ip.querySelector(".ip-path").textContent=n.href;
    ip.classList.add("visible");
  }else if(n&&n.type==="hub"){
    ip.querySelector(".ip-label").textContent="◈";
    ip.querySelector(".ip-title").textContent=n.label;
    var lc=HUBS.find(function(h){return h.id===n.hubId});
    ip.querySelector(".ip-path").textContent=(lc?lc.leaves.length:"0")+" items";
    ip.classList.add("visible");
  }else{
    ip.classList.remove("visible");
  }
}

function navTo(n){if(n&&n.href)window.location.href=n.href;}

function highlight(id){
  if(!id){
    edges.forEach(function(e){if(e.el)e.el.style.opacity="1";});
    nodes.forEach(function(n){if(n.el)n.el.style.opacity="1";});
    showInfo(null);
    return;
  }
  var connected={};
  connected[id]=true;
  edges.forEach(function(e){
    if(e.from===id||e.to===id){connected[e.from]=true;connected[e.to]=true;}
  });
  edges.forEach(function(e){
    if(!e.el)return;
    e.el.style.opacity=(connected[e.from]&&connected[e.to])?"1":"0.08";
  });
  nodes.forEach(function(n){
    if(!n.el)return;
    n.el.style.opacity=connected[n.id]?"1":"0.15";
    if(n.type==="hub"&&connected[n.id]&&n.el.firstChild)n.el.firstChild.style.opacity="0.9";
    else if(n.type==="hub"&&n.el.firstChild)n.el.firstChild.style.opacity="0.35";
  });
}

// MOUSE
cv.addEventListener("mousedown",function(e){
  var n=hitNode(e.clientX,e.clientY);
  if(n){dragId=n;sx=e.clientX;sy=e.clientY;dragging=false;highlight(n.id);}
  else{
    dragId=null;highlight(null);
    panX+=dx/zoom;panY+=dy/zoom;dx=0;dy=0;sx=e.clientX;sy=e.clientY;
  }
});
window.addEventListener("mousemove",function(e){
  if(!dragId){
    dx=e.clientX-sx;dy=e.clientY-sy;
    applyView();
    // Hover info
    var n=hitNode(e.clientX,e.clientY);
    if(n)showInfo(n);else if(!ip.classList.contains("visible"))showInfo(null);
    return;
  }
  if(Math.hypot(e.clientX-sx,e.clientY-sy)>3){
    dragging=true;wakeSim();
    var p=scrToSvg(e.clientX,e.clientY);
    dragId.x=p.x;dragId.y=p.y;
    sx=e.clientX;sy=e.clientY;
  }
});
window.addEventListener("mouseup",function(e){
  if(dragId&&!dragging)navTo(dragId);
  dragId=null;dragging=false;
});

// TOUCH
var pinchD=0,pinchZ=1,touchPan=0,touchPanY2=0;
cv.addEventListener("touchstart",function(e){
  var t=e.touches;
  if(t.length===1){
    var n=hitNode(t[0].clientX,t[0].clientY);
    if(n){dragId=n;sx=t[0].clientX;sy=t[0].clientY;dragging=false;highlight(n.id);}
    else{dragId=null;highlight(null);panX+=dx/zoom;panY+=dy/zoom;dx=0;dy=0;sx=t[0].clientX;sy=t[0].clientY;}
  }else if(t.length===2){
    dragId=null;pinchD=Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);pinchZ=tz;touchPan=panX;touchPanY2=panY;
  }
},{passive:true});
cv.addEventListener("touchmove",function(e){
  var t=e.touches;
  if(t.length===2){
    e.preventDefault();
    var d=Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);
    if(pinchD>0)tz=Math.max(0.3,Math.min(4,pinchZ*(d/pinchD)));
    return;
  }
  if(!dragId){dx=t[0].clientX-sx;dy=t[0].clientY-sy;return;}
  if(t.length!==1)return;
  var cx=t[0].clientX,cy=t[0].clientY;
  if(Math.hypot(cx-sx,cy-sy)>5){dragging=true;wakeSim();}
  var p=scrToSvg(cx,cy);dragId.x=p.x;dragId.y=p.y;sx=cx;sy=cy;
},{passive:false});
cv.addEventListener("touchend",function(e){
  if(e.touches.length>0)return;
  if(dragId&&!dragging&&e.changedTouches[0])navTo(dragId);
  dragId=null;dragging=false;
});
cv.addEventListener("wheel",function(e){e.preventDefault();tz=Math.max(0.3,Math.min(4,tz-e.deltaY*0.001));},{passive:false});

// ── CONTROLS ──
var autoRot=false;
document.getElementById("btn-auto").addEventListener("click",function(){
  autoRot=!autoRot;this.style.color=autoRot?C_GOLD:"";
});
document.getElementById("btn-reset").addEventListener("click",function(){
  HUBS.forEach(function(h,i){
    var a=i/HUBS.length*Math.PI*2-Math.PI/2;
    var hx=Math.cos(a)*hubRadius,hy=Math.sin(a)*hubRadius;
    var hn=nodeMap["hub_"+h.id];if(!hn)return;
    hn.x=hx;hn.y=hy;hn.vx=0;hn.vy=0;
    h.leaves.forEach(function(l,j){
      var ld=45+(j%3)*15;
      var la=a+(j-h.leaves.length/2)*0.2;
      var ln=nodeMap["leaf_"+h.id+"_"+j];if(!ln)return;
      ln.x=hx+Math.cos(la)*ld;ln.y=hy+Math.sin(la)*ld*0.5;ln.vx=0;ln.vy=0;
    });
  });
  wakeSim();tz=1;panX=0;panY=0;dx=0;dy=0;zoom=1;
});
document.getElementById("node-count").textContent=nodes.length-1;

window.addEventListener("keydown",function(e){
  if(e.key==="r")document.getElementById("btn-auto").click();
  if(e.key==="+")tz=Math.min(4,tz*1.15);
  if(e.key==="-")tz=Math.max(0.3,tz/1.15);
  if(e.key==="0"){tz=1;panX=0;panY=0;dx=0;dy=0;}
  if(e.key==="o"||e.key==="O")document.getElementById("btn-reset").click();
});

// ── MAIN LOOP (unified) ──
var tt=0,cgEls=[];

function mainLoop(){
  tt+=0.016;

  // Physics
  if(simRunning){physicsTick();renderFrame();}
  // Always render even when settled (for drag updates)
  else {renderFrame();}

  // Zoom/pan transition
  zoom+=(tz-zoom)*0.06;
  applyView();

  // Center glow pulse
  var pulse=0.06+Math.sin(tt*0.8)*0.025;
  var circles=sv.querySelectorAll("circle");
  if(circles.length>=3){circles[0].setAttribute("opacity",pulse);}

  // Auto rotate (only when settled)
  if(autoRot&&!simRunning){
    var rot=tt*0.03;
    nodes.forEach(function(n){
      if(n.type==="center")return;
      if(n._ox===undefined){n._ox=n.x;n._oy=n.y;}
      var c=Math.cos(rot),s=Math.sin(rot);
      n.x=n._ox*c-n._oy*s;
      n.y=n._ox*s+n._oy*c;
    });
  }

  requestAnimationFrame(mainLoop);
}

// ── ENTRY ──
setTimeout(function(){
  var els=document.querySelectorAll(".nn");
  els.forEach(function(el,i){
    el.style.opacity="0";
    setTimeout(function(){
      el.style.transition="opacity .5s ease";
      el.style.opacity="1";
    },200+i*15);
  });
},200);

mainLoop();
console.log("OrbitPrompt MCP Gallery v2 — force-directed graph, "+nodes.length+" nodes");
})();
</script>
</body>
</html>
